server:
  port: 8081

spring:
  application:
    name: order-service

  kafka:
    bootstrap-servers: kafka-1:9092,kafka-2:9092,kafka-3:9092
    producer:
      transaction-id-prefix: order-transaction-service-${random.value}-
    consumer:
      group-id: order-consumer-group
      auto-offset-reset: earliest

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8083/.well-known/jwks.json


kafka:
  topic:
    order-events: order.events.v1
    inventory-events: inventory.events.v1
    payment-events: payment.events.v1

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info